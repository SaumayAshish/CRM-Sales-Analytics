name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
          POSTGRES_DB: crm_sales_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm_user -d crm_sales_analytics_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://crm_user:crm_password@localhost:5432/crm_sales_analytics_test
          JWT_SECRET_KEY: ci-only-secret-key
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+psycopg2://crm_user:crm_password@localhost:5432/crm_sales_analytics_test
          JWT_SECRET_KEY: ci-only-secret-key
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
