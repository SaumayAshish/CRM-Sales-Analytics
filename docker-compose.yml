services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_sales_analytics
    ports:
      - "5433:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_sales_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://crm_user:crm_password@db:5432/crm_sales_analytics
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-insecure-key-change-me}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  crm_pgdata:
