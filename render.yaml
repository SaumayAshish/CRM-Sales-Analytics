# Render "Blueprint" — infra-as-code for the backend web service.
# Traces to: the project's Phase 6 deployment target.
#
# Postgres is hosted on Supabase (not Render's own managed Postgres) --
# Render's free tier caps an account at one free-tier database, and
# that slot is already used by another project (helpdesk-ai-db). Supabase's
# free tier is used instead; see DEPLOYMENT.md for the exact setup
# steps. DATABASE_URL below is intentionally left as a plaintext
# placeholder, not `generateValue`/`fromDatabase` -- it must be pasted
# in manually from the Supabase dashboard after creating that project
# (use the *Session pooler* connection string, not Direct connection --
# Supabase's direct-connection host is IPv6-only, and Render's outbound
# network has no IPv6 route to it, which fails every deploy with
# "Network is unreachable". The Session pooler resolves over IPv4 and
# works fine for Alembic + this app's per-request session usage. See
# DEPLOYMENT.md for the exact string format.)
#
# Free-tier caveat (documented, not hidden): the free web service spins
# down after 15 minutes idle, so the first request after idle takes
# ~30-50s (cold start) -- acceptable for a portfolio demo, not a real
# production SLA.
services:
  - type: web
    name: crm-sales-analytics-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
        # Paste the Supabase Session pooler connection string here manually
        # (Render dashboard -> this service -> Environment), in the form:
        # postgresql+psycopg2://postgres.<project-ref>:<password>@aws-<n>-<region>.pooler.supabase.com:5432/postgres?sslmode=require
        # (Direct connection, i.e. db.<project-ref>.supabase.co, does NOT
        # work from Render -- see the comment block above.)
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
        # Set this to the exact Vercel frontend URL once known (see
        # DEPLOYMENT.md step 5), e.g. https://crm-sales-analytics.vercel.app
        # -- no trailing slash, must match exactly or the browser blocks the
        # request as CORS. Render redeploys automatically when an env var
        # changes. Left as sync:false (not a hardcoded localhost default) so
        # a fresh blueprint apply doesn't accidentally re-deploy pointing at
        # the wrong origin.
